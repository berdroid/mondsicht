name: mondsicht
description: "View the moon"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  geolocator: ^14.0.0
  astronomia: ^0.3.1
  intl: ^0.20.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/images/mondsicht_app_icon.png"
  android: true
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/images/mondsicht_app_icon.png"
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/images/mondsicht_app_icon.png"
  windows:
    generate: true
    image_path: "assets/images/mondsicht_app_icon.png"
  web:
    generate: true
    image_path: "assets/images/mondsicht_app_icon.png"
    background_color: "#0D0D0D"
    theme_color: "#D4AF6A"
  linux:
    generate: true
    image_path: "assets/images/mondsicht_app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/full_moon.png
    - assets/images/mondsicht_app_icon.png
